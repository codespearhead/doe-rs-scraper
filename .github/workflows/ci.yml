name: Test Project

on:
  push:
    branches: [main, release/2]
  pull_request:
    branches: [main, release/2]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 1
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: './package.json'

      - name: Cache npm dependencies
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci --prefer-offline --ignore-scripts --strict-peer-deps

      - name: Check for dependency compatibility issues
        run: npm dedupe --dry-run

      - name: Lint
        run: npm run lint:write:dry-run

      - name: Format
        run: npm run format:write:dry-run

      - name: Run tests
        run: npm run test
